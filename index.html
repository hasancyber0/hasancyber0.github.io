<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video & Story Downloader</title>
    <style>
        :root { 
            --primary: #6e8efb; 
            --secondary: #a777e3; 
        }

        /* Animated Background */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: #333; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        h2 { margin-top: 0; color: #444; font-size: 26px; font-weight: bold; }
        p { font-size: 14px; color: #555; margin-bottom: 20px; }

        .input-box { margin: 25px 0; }
        input { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #ddd; 
            border-radius: 12px; 
            font-size: 16px; 
            transition: 0.3s; 
            box-sizing: border-box; 
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(110, 142, 251, 0.3); }

        button { 
            width: 100%; 
            padding: 15px; 
            background: linear-gradient(to right, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        button:hover { box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.97); }

        #result { 
            margin-top: 25px; 
            padding: 15px; 
            border-radius: 12px; 
            display: none; 
            background: #fff; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            word-break: break-all; 
        }

        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid var(--primary); 
            border-radius: 50%; 
            width: 35px; 
            height: 35px; 
            animation: spin 1s linear infinite; 
            display: none; 
            margin: 20px auto; 
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .download-btn {
            text-decoration: none; 
            color: white; 
            background: #28a745; 
            padding: 12px 25px; 
            border-radius: 8px; 
            display: inline-block;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Story & Video Downloader</h2>
    <p>Supports TikTok, Instagram, Facebook & CapCut</p>
    
    <div class="input-box">
        <input type="text" id="videoUrl" placeholder="Paste link here...">
    </div>
    
    <button id="dlBtn" onclick="handleDownload()">Get Download Link</button>
    
    <div class="loader" id="loader"></div>
    <div id="result"></div>
</div>

<script>
    async function handleDownload() {
        const url = document.getElementById('videoUrl').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('dlBtn');

        if (!url) {
            alert("Please paste a valid link first!");
            return;
        }

        // UI Reset
        resultDiv.style.display = "none";
        loader.style.display = "block";
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const response = await fetch("https://api.cobalt.tools/api/json", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    url: url,
                    videoQuality: "720"
                })
            });

            const data = await response.json();

            if (data.url) {
                resultDiv.innerHTML = `<strong style="color:#28a745; font-size:18px;">Success!</strong><br><br>
                                       <a href="${data.url}" target="_blank" class="download-btn">Download Now</a>`;
                resultDiv.style.display = "block";
            } else {
                throw new Error("Invalid Link");
            }

        } catch (error) {
            resultDiv.innerHTML = `<span style="color:#dc3545;">Sorry! Could not fetch the video. Please check the link and try again.</span>`;
            resultDiv.style.display = "block";
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "Get Download Link";
        }
    }
</script>

</body>
</html>
