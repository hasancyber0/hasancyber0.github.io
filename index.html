<script>
    function sendToWA() {
        const name = document.getElementById('uName').value || "Guest User";
        const cat = document.getElementById('uCategory').value;
        const msg = document.getElementById('uDetails').value;
        if (!cat || !msg) { alert("সবগুলো তথ্য সঠিকভাবে প্রদান করুন!"); return; }
        const phone = "8801323630741";
        const fullMsg = `*HASAN CYBER EXPERT - CASE REPORT*%0A%0A*Client Name:* ${name}%0A*Case Category:* ${cat}%0A*Technical Details:* ${msg}`;
        window.location.href = "https://api.whatsapp.com/send?phone=" + phone + "&text=" + fullMsg;
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particlesArray = [];

    class Particle {
        constructor(x, y, dx, dy, size) { this.x = x; this.y = y; this.dx = dx; this.dy = dy; this.size = size; }
        draw() { 
            ctx.beginPath(); 
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
            ctx.fillStyle = 'rgba(0, 212, 255, 0.9)'; 
            ctx.fill(); 
        }
        update() {
            if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
            if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
            this.x += this.dx; this.y += this.dy;
            this.draw();
        }
    }

    function init() {
        particlesArray = [];
        let n = (canvas.width * canvas.height) / 7000; 
        for (let i = 0; i < n; i++) {
            let size = Math.random() * 2.5 + 1;
            let x = Math.random() * innerWidth;
            let y = Math.random() * innerHeight;
            let dx = Math.random() * 0.8 - 0.4;
            let dy = Math.random() * 0.8 - 0.4;
            particlesArray.push(new Particle(x, y, dx, dy, size));
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0,0,innerWidth, innerHeight);
        particlesArray.forEach(p => p.update());
        for(let a=0; a<particlesArray.length; a++){
            for(let b=a; b<particlesArray.length; b++){
                let dist = ((particlesArray[a].x - particlesArray[b].x)**2) + ((particlesArray[a].y - particlesArray[b].y)**2);
                if(dist < 12000){
                    ctx.strokeStyle = 'rgba(0, 212, 255, 0.3)'; 
                    ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                    ctx.lineTo(particlesArray[b].x, particlesArray[b].y); ctx.stroke();
                }
            }
        }
    }
    window.addEventListener('resize', () => { canvas.width = innerWidth; canvas.height = innerHeight; init(); });
    init(); animate();
</script>
