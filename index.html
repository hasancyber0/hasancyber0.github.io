<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Security Expert - Bruno</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --bg1:#04101a; --bg2:#0a1727; --bg3:#101f33;
      --text:#ecfffa; --neon:#00ffc3; --neon2:#00d9ff;
      --shadow:0 0 34px rgba(0,255,195,0.18);
      --line:rgba(0,255,195,0.18);
      --line-2:rgba(255,255,255,0.08);
    }

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      position:relative;
    }

    .grid-bg,.noise,#matrixCanvas,.scanlines,.orb{position:fixed;inset:0;pointer-events:none;}

    .container{width:min(1040px,92%);margin:0 auto;position:relative;z-index:2;padding:26px 0;}

    /* NEW TOP BOX */
    .top-box{
      margin-top:18px;
      padding:16px;
      text-align:center;
      border-radius:18px;
      border:1px solid rgba(0,255,195,0.18);
      background:rgba(10,16,30,0.75);
      backdrop-filter:blur(14px);
      box-shadow:0 0 25px rgba(0,255,195,0.12);
    }

    .top-text{
      font-family:"Orbitron";
      font-weight:900;
      color:var(--neon);
      letter-spacing:1px;
    }

    .top-sub{
      font-family:"Orbitron";
      font-weight:800;
      margin-top:6px;
      background:linear-gradient(90deg,#fff,#00ffc3,#00d9ff,#9d5cff,#ff4fd8,#fff);
      -webkit-background-clip:text;
      color:transparent;
    }

    /* HERO */
    .hero{
      margin-top:18px;
      padding:26px;
      border-radius:28px;
      border:1px solid var(--line);
      background:rgba(10,16,30,0.78);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .hero-title{
      font-family:"Orbitron";
      font-weight:900;
      background:linear-gradient(90deg,#fff,#00ffc3,#00d9ff,#9d5cff,#ff4fd8,#fff);
      -webkit-background-clip:text;
      color:transparent;
    }

    .hero-line{height:1px;background:linear-gradient(90deg,transparent,var(--neon),transparent);margin-top:14px;}

    /* PANEL */
    .panel{
      margin-top:20px;
      padding:22px;
      border-radius:24px;
      border:1px solid var(--line);
      background:rgba(10,16,30,0.75);
    }

    .panel-title{
      font-family:"Orbitron";
      font-weight:800;
      margin-bottom:14px;
    }

    /* SOCIAL */
    .social-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

    .social-btn{
      padding:16px;
      border-radius:18px;
      text-align:center;
      border:1px solid var(--line-2);
      text-decoration:none;
      color:var(--text);
      transition:.3s;
    }

    .social-btn:hover{
      transform:translateY(-4px);
      border-color:var(--neon);
    }

    /* FORM */
    input,select,textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05);
      color:#fff;
    }

    .submit-btn{
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:16px;
      font-weight:800;
      cursor:pointer;
      background:linear-gradient(90deg,#00ffc3,#00d9ff,#9d5cff,#ff4fd8,#ffe066);
    }

    /* FOOTER FIX */
    .footer{
      margin-top:18px;
      text-align:center;
      white-space:nowrap;
    }

    .footer-text{
      font-family:"Orbitron";
      font-weight:800;
      font-size:13px;
      background:linear-gradient(90deg,#fff,#00ffc3,#00d9ff,#9d5cff,#ff4fd8,#fff);
      -webkit-background-clip:text;
      color:transparent;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- NEW BOX -->
  <div class="top-box">
    <div class="top-text">HEY I'M BRUNO</div>
    <div class="top-sub">CYBER SECURITY EXPERT</div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-title">CYBER SECURITY EXPERT</div>
    <div class="hero-line"></div>
  </section>

  <!-- PANEL -->
  <section class="panel">
    <h2 class="panel-title">My Information</h2>

    <div class="social-grid">
      <a class="social-btn" href="#">Facebook</a>
      <a class="social-btn" href="#">Instagram</a>
      <a class="social-btn" href="#">TikTok</a>
      <a class="social-btn" href="#">WhatsApp</a>
    </div>
  </section>

  <!-- FORM -->
  <section class="panel">
    <h2 class="panel-title">Tell us your problem</h2>

    <form id="supportForm">
      <input type="text" placeholder="Name (optional)">
      <select>
        <option>Select Service</option>
      </select>
      <textarea placeholder="Write your problem"></textarea>
      <button class="submit-btn">Submit on WhatsApp</button>
    </form>
  </section>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-text">© 2026 CYBER SECURITY EXPERT BRUNO</span>
  </div>

</div>

</body>
      </html>
