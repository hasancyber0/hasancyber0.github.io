<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN CYBER EXPERT</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050810; --card: #162031; --text: #f8fafc; --accent: #00d4ff; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        .menu-dot {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1000;
            cursor: pointer;
            background: rgba(22, 32, 49, 0.9);
            padding: 10px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .menu-dot span { width: 20px; height: 2px; background-color: var(--accent); display: block; box-shadow: 0 0 8px var(--accent); }

        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; right: 0;
            background-color: rgba(5, 10, 20, 0.98); backdrop-filter: blur(15px);
            overflow-x: hidden; transition: 0.5s;
        }

        .overlay-content { position: relative; top: 10%; width: 100%; padding: 25px; box-sizing: border-box; }
        .overlay .closebtn { position: absolute; top: 20px; right: 25px; font-size: 40px; color: #ff4d4d; text-decoration: none; }

        .info-card {
            position: relative; background: #0a111e; padding: 25px; border-radius: 12px;
            max-width: 320px; margin: 0 auto; border: 1px solid rgba(0, 212, 255, 0.3);
            overflow: hidden;
        }

        /* Dual Scanning Light Effects */
        .info-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.3), transparent);
            animation: scanLeft 3s infinite linear; z-index: 1;
        }
        .info-card::after {
            content: ''; position: absolute; top: 0; right: -100%; width: 50%; height: 100%;
            background: linear-gradient(270deg, transparent, rgba(255, 0, 212, 0.3), transparent);
            animation: scanRight 3s infinite linear; animation-delay: 1.5s; z-index: 1;
        }

        @keyframes scanLeft { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes scanRight { 0% { right: -100%; } 100% { right: 100%; } }

        .info-card h2 { 
            font-family: 'Orbitron', sans-serif; font-size: 18px; text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 10px;
            position: relative; z-index: 2; margin-bottom: 20px;
        }

        .info-item { 
            margin-bottom: 12px; font-size: 16px; display: flex; justify-content: space-between; 
            font-weight: 700; position: relative; z-index: 2;
        }

        /* RGB Text Animation - Removed White/Green colors */
        .rgb-info {
            background-image: linear-gradient(to right, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: flowLR 3s linear infinite; text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container { max-width: 480px; margin: 45px auto 0 auto; position: relative; z-index: 1; }
        .glass-box { text-align: center; background: rgba(22, 32, 49, 0.5); border-radius: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(0, 212, 255, 0.3); }
        .rainbow-text { font-weight: 800; text-transform: uppercase; font-family: 'Orbitron', sans-serif; background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; }
        h1 { font-size: clamp(16px, 5vw, 22px); margin: 0; background-image: linear-gradient(to right, #ff0000, #fffb00, #00ffd5, #7a00ff, #ff0000); animation: flowLR 4s linear infinite; }
        
        @keyframes flowLR { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        .btn { padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 700; color: white; text-align: center; }
        .btn-wa { background: #25d366; } .btn-fb { background: #1877f2; }

        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #fff; border-left: 5px solid #3b82f6; padding-left: 12px; font-family: 'Orbitron', sans-serif;}
        .card { background: var(--card); padding: 20px; border-radius: 18px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .form-input, .form-select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #1e293b; background: #050810; color: #fff; margin-bottom: 12px; box-sizing: border-box; outline: none;}
        .submit-btn { width: 100%; padding: 16px; border-radius: 10px; border: none; background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="menu-dot" onclick="openNav()">
    <span></span><span></span><span></span>
</div>

<div id="myNav" class="overlay">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="overlay-content">
        <div class="info-card">
            <h2 class="rgb-info">MY INFORMATION</h2>
            <div class="info-item"><span class="rgb-info">Name:</span> <span class="rgb-info">Hasan</span></div>
            <div class="info-item"><span class="rgb-info">Address:</span> <span class="rgb-info">Sylhet, BD</span></div>
            <div class="info-item"><span class="rgb-info">Class:</span> <span class="rgb-info">SSC 27</span></div>
            <div class="info-item"><span class="rgb-info">Age:</span> <span class="rgb-info">16+</span></div>
            <div class="info-item"><span class="rgb-info">Status:</span> <span class="rgb-info">Single</span></div>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="glass-box" style="padding: 15px; margin-bottom: 15px;">
        <h1 class="rainbow-text">HASAN CYBER EXPERT</h1>
    </div>

    <div class="btn-grid">
        <a href="https://wa.me/8801323630741" class="btn btn-wa">WhatsApp</a>
        <a href="https://www.facebook.com/share/1MHz1Sgnyh/" class="btn btn-fb">Facebook</a>
    </div>

    <span class="section-title">CASE SUBMISSION</span>
    <div class="card">
        <form id="waForm">
            <input type="text" id="uName" placeholder="Your Name" class="form-input">
            <select id="uCategory" class="form-select" required>
                <option value="" disabled selected>Select Case Category</option>
                <optgroup label="Account Recovery & Forensics">
                    <option value="Hacked Facebook Recovery">Advanced Facebook Account Recovery</option>
                    <option value="Facebook Business Page Restoration">Business Page Restoration</option>
                    <option value="Instagram Forensic Recovery">Instagram Forensic ID Restoration</option>
                    <option value="TikTok Guideline Ban Appeal">TikTok Permanent Ban Appeal</option>
                    <option value="2FA & Security Lock Bypass">2FA & Security Lock Bypass</option>
                </optgroup>
                <optgroup label="Cyber Investigation (OSINT)">
                    <option value="Advanced OSINT Investigation">OSINT Investigation</option>
                    <option value="Phone Number Data Tracing">Phone Number Data Tracing</option>
                    <option value="Cyber Bullying & Extortion">Cyber Blackmail Solution</option>
                </optgroup>
                <optgroup label="Malware & Device Security">
                    <option value="Spyware/Rat Removal">Spyware & RAT Removal</option>
                    <option value="Device Hardening Audit">Smartphone Security Hardening</option>
                </optgroup>
                <option value="Other High Priority Case">Other High-Priority Case</option>
            </select>
            <textarea id="uDetails" rows="4" placeholder="Describe Your Problem" class="form-input" style="resize: none;" required></textarea>
            <button type="button" onclick="sendToWA()" class="submit-btn">SUBMIT TO WHATSAPP</button>
        </form>
    </div>
</div>

<script>
    function openNav() { document.getElementById("myNav").style.width = "100%"; }
    function closeNav() { document.getElementById("myNav").style.width = "0%"; }

    function sendToWA() {
        const name = document.getElementById('uName').value || "Guest";
        const cat = document.getElementById('uCategory').value;
        const msg = document.getElementById('uDetails').value;
        if (!cat || !msg) { alert("সবগুলো তথ্য প্রদান করুন!"); return; }
        window.location.href = `https://wa.me/8801323630741?text=*CASE REPORT*%0A%0A*Name:* ${name}%0A*Category:* ${cat}%0A*Details:* ${msg}`;
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particlesArray = [];

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
            this.dx = (Math.random() * 0.6 - 0.3); this.dy = (Math.random() * 0.6 - 0.3);
            this.size = Math.random() * 2 + 1;
        }
        update() {
            if (this.x > canvas.width || this.x < 0) this.dx = -this.dx;
            if (this.y > canvas.height || this.y < 0) this.dy = -this.dy;
            this.x += this.dx; this.y += this.dy;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = '#00d4ff'; ctx.fill();
        }
    }

    function init() { for (let i = 0; i < 70; i++) particlesArray.push(new Particle()); }
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particlesArray.forEach(p => p.update());
        requestAnimationFrame(animate);
    }
    init(); animate();
</script>

</body>
</html>
