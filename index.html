<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASAN CYBER EXPERT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050810; --card: #162031; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; overflow-x: hidden; }
        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }
        .container { max-width: 480px; margin: 0 auto; position: relative; z-index: 1; }
        
        /* --- Header Box Style (Glassmorphism) --- */
        .header { 
            margin: 40px 0; 
            text-align: center; 
            overflow: hidden; 
            padding: 20px 10px;
            /* কাঁচের মতো স্বচ্ছ ব্যাকগ্রাউন্ড */
            background: rgba(22, 32, 49, 0.5); 
            border-radius: 15px;
            /* পেছনের ব্যাকগ্রাউন্ড ব্লার করার জন্য */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            /* হালকা গ্লোয়িং বর্ডার */
            border: 1px solid rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        
        /* --- Multi-Color Flowing Animation --- */
        h1 { 
            font-size: clamp(14px, 5.5vw, 26px); /* বক্সের ভেতর ফিট করার জন্য সামান্য ছোট করা হয়েছে */
            margin: 0; 
            font-weight: 800; 
            text-transform: uppercase; 
            font-family: 'Orbitron', sans-serif; 
            white-space: nowrap; 
            letter-spacing: 2px;
            
            /* Gradient with popular colors */
            background: linear-gradient(
                to right, 
                #ff0000, #ff7300, #fffb00, #48ff00, 
                #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Fast Flowing Animation */
            animation: rainbowFlow 3s linear infinite;
        }

        @keyframes rainbowFlow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 35px; }
        .btn { padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 700; color: white; text-align: center; transition: 0.3s; font-size: 14px; }
        .btn-wa { background: #25d366; } .btn-ig { background: linear-gradient(45deg, #f09433, #bc1888); }
        .btn-fb { background: #1877f2; } .btn-tt { background: #000; border: 1px solid #333; }
        
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: #fff; border-left: 5px solid #3b82f6; padding-left: 12px; display: block; font-family: 'Orbitron', sans-serif; }
        
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #3b82f6; box-shadow: 0 5px 20px rgba(0,212,255,0.2); }
        .form-input, .form-select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #1e293b; background: #050810; color: #fff; outline: none; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; }
        
        .submit-btn { width: 100%; padding: 18px; border-radius: 10px; border: none; background: linear-gradient(90deg, #3b82f6, #8b5cf6); color: white; font-weight: 800; font-size: 16px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .submit-btn:hover { transform: scale(0.98); opacity: 0.9; }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="container">
    <div class="header">
        <h1>HASAN CYBER EXPERT</h1>
    </div>
    
    <div class="btn-grid">
        <a href="https://wa.me/8801323630741" class="btn btn-wa">WhatsApp</a>
        <a href="https://www.instagram.com/bruno_your_father" class="btn btn-ig">Instagram</a>
        <a href="https://www.facebook.com/share/1MHz1Sgnyh/" class="btn btn-fb">Facebook</a>
        <a href="https://www.tiktok.com/@bruno_your_father1" class="btn btn-tt">TikTok</a>
    </div>

    <span class="section-title">CASE SUBMISSION</span>
    <div class="card">
        <form id="waForm">
            <input type="text" id="uName" placeholder="Your Name (Optional)" class="form-input">
            <select id="uCategory" class="form-select" required>
                <option value="" disabled selected>Select Case Category</option>
                <option value="TikTok Account Ban Appeal">TikTok Account Ban Appeal</option>
                <option value="TikTok Account Recovery">TikTok Account Recovery</option>
                <option value="Instagram Disabled ID Recovery">Instagram Disabled ID Recovery</option>
                <option value="Facebook Page Admin Recovery">Facebook Page Admin Recovery</option>
                <option value="Facebook Account Recovery">Facebook Account Recovery</option>
                <option value="Number to Information (OSINT)">Number to Information (OSINT)</option>
                <option value="2FA Bypass">2FA Bypass</option>
                <option value="Fake Profile Takedown">Fake Profile Takedown</option>
                <option value="Security Audit">Security Audit</option>
                <option value="Other">Other</option>
            </select>
            <textarea id="uDetails" rows="4" placeholder="Describe your problem..." class="form-input" style="resize: none;" required></textarea>
            <button type="button" onclick="sendToWA()" class="submit-btn">SUBMIT TO WHATSAPP</button>
        </form>
    </div>
    <div style="text-align: center; margin-top: 40px; font-size: 11px; color: #475569;">&copy; 2026 HASAN CYBER EXPERT | SYLHET, BD</div>
</div>

<script>
    function sendToWA() {
        const name = document.getElementById('uName').value || "Guest User";
        const cat = document.getElementById('uCategory').value;
        const msg = document.getElementById('uDetails').value;

        if (!cat || !msg) {
            alert("Please fill the required fields!");
            return;
        }

        const phone = "8801323630741";
        const fullMsg = `*HASAN CYBER EXPERT - NEW CASE*%0A%0A*Name:* ${name}%0A*Category:* ${cat}%0A*Problem:* ${msg}`;
        
        const url = "https://api.whatsapp.com/send?phone=" + phone + "&text=" + fullMsg;
        window.location.href = url;
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let parts = [];
    class P {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = Math.random() * 0.6 - 0.3;
            this.vy = Math.random() * 0.6 - 0.3;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            ctx.fillStyle = "#00d4ff"; ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI*2); ctx.fill();
        }
    }
    for(let i=0; i<60; i++) parts.push(new P());
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        parts.forEach(p => p.update());
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
    </html>
