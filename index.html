<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Security Expert - Bruno</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --bg1:#04101a;
      --bg2:#0a1727;
      --bg3:#101f33;
      --card:rgba(10,16,30,0.78);
      --line:rgba(0,255,195,0.18);
      --line-2:rgba(255,255,255,0.08);
      --text:#ecfffa;
      --neon:#00ffc3;
      --neon2:#00d9ff;
      --pink:#ff4fd8;
      --shadow:0 0 34px rgba(0,255,195,0.18);
    }

    html{scroll-behavior:smooth;}

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    }

    .container{
      width:min(1040px,92%);
      margin:0 auto;
      padding:26px 0;
      position:relative;
      z-index:2;
    }

    /* HERO */
    .hero{
      border:1px solid var(--line);
      border-radius:28px;
      padding:26px;
      background:rgba(10,16,30,0.75);
      box-shadow:var(--shadow);
      text-align:center;
    }

    .hero-title{
      font-family:"Orbitron";
      font-weight:900;
      font-size:clamp(1.1rem,3vw,2rem);
      text-transform:uppercase;
      letter-spacing:2px;
      color:var(--neon);
      margin-bottom:12px;
    }

    .hero-name-box{
      display:inline-block;
      padding:14px 22px;
      border-radius:16px;
      border:1px solid rgba(0,255,195,0.25);
      background:rgba(0,255,195,0.08);
      font-family:"Orbitron";
      font-weight:900;
      letter-spacing:1.5px;
      text-transform:uppercase;
      color:var(--neon);
    }

    .hero-line{
      margin-top:18px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--neon),transparent);
    }

    /* PANEL */
    .panel{
      margin-top:20px;
      padding:22px;
      border-radius:24px;
      border:1px solid var(--line);
      background:var(--card);
    }

    .panel-title{
      font-family:"Orbitron";
      font-weight:800;
      margin-bottom:16px;
      display:flex;
      gap:10px;
      align-items:center;
    }

    .social-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
    }

    .social-btn{
      padding:16px;
      border-radius:16px;
      border:1px solid var(--line-2);
      text-decoration:none;
      color:var(--text);
      text-align:center;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }

    .full{grid-column:1/-1;}

    input,select,textarea{
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line-2);
      background:rgba(255,255,255,0.04);
      color:white;
    }

    .submit-btn{
      padding:16px;
      border:none;
      border-radius:16px;
      font-weight:800;
      background:linear-gradient(90deg,var(--neon),var(--neon2),var(--pink));
      cursor:pointer;
    }

    .footer{
      text-align:center;
      margin-top:18px;
      font-size:12px;
      font-family:"Orbitron";
      letter-spacing:1px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- HERO (UPDATED) -->
  <section class="hero">

    <div class="hero-title">CYBER SECURITY EXPERT</div>

    <div class="hero-name-box">HEY I'M BRUNO</div>

    <div class="hero-line"></div>
  </section>

  <!-- SOCIAL -->
  <section class="panel">
    <h2 class="panel-title"><i class="fa fa-user"></i> My Information</h2>

    <div class="social-grid">
      <a class="social-btn" href="#">Facebook</a>
      <a class="social-btn" href="#">Instagram</a>
      <a class="social-btn" href="#">TikTok</a>
      <a class="social-btn" href="#">WhatsApp</a>
    </div>
  </section>

  <!-- FORM -->
  <section class="panel">
    <h2 class="panel-title"><i class="fa fa-file"></i> Tell us your problem</h2>

    <form id="supportForm">
      <input class="full" type="text" placeholder="Your Name (optional)">

      <select class="full">
        <option>Select Service</option>
      </select>

      <textarea class="full" placeholder="Describe your problem"></textarea>

      <button class="submit-btn full">Submit on WhatsApp</button>
    </form>
  </section>

  <!-- FOOTER (UPDATED SINGLE LINE) -->
  <div class="footer">
    © 2026 CYBER SECURITY EXPERT BRUNO
  </div>

</div>

</body>
</html>
