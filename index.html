<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Cyber Security Expert - Bruno</title>  
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  
  <style>  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }  
  
    :root{  
      --bg1:#04101a;  
      --bg2:#0a1727;  
      --bg3:#101f33;  
      --card:rgba(10,16,30,0.78);  
      --line:rgba(0,255,195,0.18);  
      --line-2:rgba(255,255,255,0.08);  
      --text:#ecfffa;  
      --muted:#b8ddd3;  
      --neon:#00ffc3;  
      --neon2:#00d9ff;  
      --pink:#ff4fd8;  
      --purple:#9d5cff;  
      --green:#53ff83;  
      --yellow:#ffe066;  
      --shadow:0 0 34px rgba(0,255,195,0.18);  
    }  
  
    html{ scroll-behavior:smooth; }  
  
    body{  
      min-height:100vh;  
      font-family:"Inter", sans-serif;  
      color:var(--text);  
      overflow-x:hidden;  
      background:  
        radial-gradient(circle at 10% 10%, rgba(0,255,195,0.16), transparent 26%),  
        radial-gradient(circle at 90% 15%, rgba(0,217,255,0.18), transparent 28%),  
        radial-gradient(circle at 80% 85%, rgba(157,92,255,0.16), transparent 26%),  
        radial-gradient(circle at 25% 75%, rgba(255,79,216,0.12), transparent 24%),  
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));  
      position:relative;  
    }  
  
    .grid-bg{  
      position:fixed;  
      inset:0;  
      background-image:  
        linear-gradient(rgba(0,255,195,0.06) 1px, transparent 1px),  
        linear-gradient(90deg, rgba(0,255,195,0.06) 1px, transparent 1px);  
      background-size:38px 38px;  
      animation:gridMove 10s linear infinite;  
      pointer-events:none;  
      z-index:0;  
      mask-image: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(255,255,255,0.35));  
    }  
  
    @keyframes gridMove{  
      from{transform:translateY(0);}  
      to{transform:translateY(38px);}  
    }  
  
    .noise{  
      position:fixed;  
      inset:0;  
      pointer-events:none;  
      z-index:0;  
      opacity:0.04;  
      background-image:  
        radial-gradient(circle at 25% 25%, #fff 0.6px, transparent 0.7px),  
        radial-gradient(circle at 75% 45%, #fff 0.6px, transparent 0.7px),  
        radial-gradient(circle at 35% 75%, #fff 0.6px, transparent 0.7px),  
        radial-gradient(circle at 65% 15%, #fff 0.6px, transparent 0.7px);  
      background-size: 120px 120px;  
    }  
  
    .orb{  
      position:fixed;  
      border-radius:50%;  
      filter:blur(46px);  
      pointer-events:none;  
      z-index:0;  
      opacity:0.22;  
      animation:floatOrb 7s ease-in-out infinite alternate;  
    }  
  
    .orb1{ width:260px; height:260px; background:var(--neon); top:30px; left:-50px; }  
    .orb2{ width:280px; height:280px; background:var(--neon2); right:-70px; bottom:60px; animation-duration:9s; }  
    .orb3{ width:200px; height:200px; background:var(--pink); top:50%; left:50%; transform:translateX(-50%); animation-duration:11s; opacity:0.14; }  
  
    @keyframes floatOrb{  
      from{transform:translateY(0) scale(1);}  
      to{transform:translateY(28px) scale(1.1);}  
    }  
  
    #matrixCanvas{  
      position:fixed;  
      inset:0;  
      width:100%;  
      height:100%;  
      z-index:0;  
      opacity:0.18;  
      pointer-events:none;  
    }  
  
    .scanlines{  
      position:fixed;  
      inset:0;  
      z-index:0;  
      pointer-events:none;  
      opacity:0.09;  
      background:  
        repeating-linear-gradient(  
          to bottom,  
          rgba(255,255,255,0.05) 0px,  
          rgba(255,255,255,0.05) 1px,  
          transparent 2px,  
          transparent 5px  
        );  
      animation:scanMove 4.5s linear infinite;  
    }  
  
    @keyframes scanMove{  
      from{transform:translateY(0);}  
      to{transform:translateY(22px);}  
    }  
  
    .container{  
      width:min(1040px, 92%);  
      margin:0 auto;  
      position:relative;  
      z-index:2;  
      padding:26px 0 42px;  
    }  
  
    .hero-container {  
      display: flex;  
      flex-direction: column;  
      gap: 16px;  
      margin-top: 18px;  
    }  
  
    .profile-pic-center {  
      display: flex;  
      justify-content: center;  
      width: 100%;  
      margin-bottom: 20px;  
    }  
  
    .round-profile {  
      width: 110px;  
      height: 110px;  
      border-radius: 50%;  
      object-fit: cover;  
      border: 3px solid var(--neon);  
      box-shadow: 0 0 15px rgba(0, 255, 195, 0.4);  
      backdrop-filter: blur(8px);  
    }  
  
    .hero-box {  
      position: relative;  
      overflow: hidden;  
      border-radius: 20px;  
      border: 1px solid var(--line);  
      background: linear-gradient(180deg, rgba(12,18,32,0.92), rgba(8,13,24,0.78));  
      backdrop-filter: blur(16px);  
      box-shadow:  
        0 15px 45px rgba(0,0,0,0.25),  
        0 0 0 1px rgba(255,255,255,0.02) inset,  
        var(--shadow);  
      padding: 20px 24px;  
      display: flex;  
      justify-content: center;  
      align-items: center;  
      text-align: center;  
      width: 100%;  
    }  
  
    .hero-box.bruno-small-box {  
      width: 100%; /* পরিবর্তন: auto থেকে 100% করা হয়েছে সমান করার জন্য */
      display: flex; /* পরিবর্তন: inline-flex থেকে flex করা হয়েছে */
      justify-content: center;
      padding: 10px 30px;  
      border-radius: 14px;  
      margin-top: -2px;  
    }  
  
    .hero-box::before {  
      content: "";  
      position: absolute;  
      inset: -1px;  
      background: linear-gradient(90deg,  
          rgba(0,255,195,0.14),  
          rgba(0,217,255,0.12),  
          rgba(157,92,255,0.14),  
          rgba(255,79,216,0.10)  
        );  
      filter: blur(20px);  
      z-index: 0;  
      opacity: 0.9;  
    }  
  
    .hero-box > * { position: relative; z-index: 1; }  
  
    .hero-title{  
      font-family:"Orbitron", sans-serif;  
      font-weight:900;  
      text-transform:uppercase;  
      letter-spacing:1.4px;  
      font-size:clamp(1.2rem, 3.2vw, 2.4rem);  
      line-height:1.2;  
      white-space:nowrap;  
      background:linear-gradient(90deg, #ffffff 0%, #00ffc3 14%, #00d9ff 28%, #9d5cff 42%, #ff4fd8 58%, #ffe066 74%, #53ff83 88%, #ffffff 100%);  
      background-size:300% 100%;  
      -webkit-background-clip:text;  
      background-clip:text;  
      color:transparent;  
      animation:rgbText 5.5s linear infinite;  
    }  
  
    .hero-subtitle{  
      font-family:"Orbitron", sans-serif;  
      font-weight:800;  
      text-transform:uppercase;  
      letter-spacing: 1.2px;  
      font-size:clamp(0.85rem, 2.2vw, 1.2rem);  
      line-height:1.2;  
      white-space:nowrap;  
      display: block;  
      text-align: center;  
      background:linear-gradient(90deg, #ffffff 0%, #00ffc3 25%, #00d9ff 50%, #ff4fd8 75%, #ffffff 100%);  
      background-size:300% 100%;  
      -webkit-background-clip:text;  
      background-clip:text;  
      color:transparent;  
      animation:brunoGlow 4.5s linear infinite;  
    }  
  
    @keyframes rgbText{  
      0%{ background-position:0% 50%; }  
      100%{ background-position:300% 50%; }  
    }  
  
    @keyframes brunoGlow{  
      0%{ background-position:0% 50%; }  
      100%{ background-position:300% 50%; }  
    }  
  
    .panel{  
      position:relative;  
      overflow:hidden;  
      border:1px solid var(--line);  
      background:var(--card);  
      border-radius:24px;  
      padding:22px;  
      box-shadow: 0 18px 55px rgba(0,0,0,0.24), 0 0 0 1px rgba(255,255,255,0.02) inset, var(--shadow);  
      backdrop-filter:blur(14px);  
      margin-top:20px;  
    }  
  
    .panel::before{  
      content:"";  
      position:absolute;  
      inset:auto auto -40px -40px;  
      width:140px;  
      height:140px;  
      border-radius:50%;  
      background:radial-gradient(circle, rgba(0,255,195,0.16), transparent 70%);  
      pointer-events:none;  
    }  
  
    .panel-title{  
      font-family:"Orbitron", sans-serif;  
      font-size:1rem;  
      font-weight:800;  
      letter-spacing:1px;  
      margin-bottom:16px;  
      display:flex;  
      align-items:center;  
      gap:12px;  
      color:#f3fffb;  
      text-transform:uppercase;  
      flex-wrap:wrap;  
    }  
  
    .problem-heading{ text-transform:none !important; font-size:1rem; white-space:nowrap; }  
  
    .panel-title i{ color:var(--neon); font-size:1rem; filter:drop-shadow(0 0 8px rgba(0,255,195,0.35)); }  
  
    .social-grid{  
      display:grid;  
      grid-template-columns:repeat(2, minmax(0, 1fr));  
      gap:14px;  
      max-width:700px;  
      margin:0 auto;  
    }  
  
    .social-btn{  
      position:relative;  
      overflow:hidden;  
      text-decoration:none;  
      color:var(--text);  
      border:1px solid var(--line-2);  
      background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));  
      border-radius:18px;  
      padding:17px 14px;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      gap:12px;  
      min-height:68px;  
      transition:0.25s ease;  
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);  
    }  
  
    .social-btn::before{ content:""; position:absolute; inset:0; background:linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent); transform:translateX(-100%); transition:0.5s ease; }  
    .social-btn:hover::before{ transform:translateX(100%); }  
  
    .social-btn:hover{  
      transform:translateY(-4px);  
      border-color:rgba(0,255,195,0.25);  
      box-shadow:0 0 24px rgba(0,255,195,0.12);  
      background:linear-gradient(180deg, rgba(0,255,195,0.08), rgba(255,255,255,0.03));  
    }  
  
    .social-btn i{ font-size:1.4rem; color:var(--neon); width:28px; text-align:center; filter:drop-shadow(0 0 8px rgba(0,255,195,0.35)); }  
    .social-btn span{ font-weight:700; font-size:15px; letter-spacing:.2px; }  
  
    form{ display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:4px; }  
    .full{ grid-column:1 / -1; }  
    .input-wrap{ display:flex; flex-direction:column; gap:8px; }  
    label{ font-size:13.5px; color:#dffef4; font-weight:700; letter-spacing:.25px; }  
    input, select, textarea{ width:100%; border:none; outline:none; border-radius:16px; padding:15px 16px; background:rgba(255,255,255,0.042); border:1px solid rgba(255,255,255,0.09); color:var(--text); font-size:15px; transition:0.22s ease; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01); }  
    input:focus, select:focus, textarea:focus{ border-color:rgba(0,255,195,0.42); box-shadow:0 0 0 4px rgba(0,255,195,0.08), 0 0 20px rgba(0,255,195,0.06); background:rgba(255,255,255,0.055); }  
    textarea{ min-height:185px; resize:vertical; line-height:1.65; }  
    .submit-btn{ position:relative; overflow:hidden; border:none; padding:16px 20px; border-radius:18px; font-size:16px; font-weight:800; cursor:pointer; color:#07130f; background:linear-gradient(90deg, #00ffc3, #00d9ff, #9d5cff, #ff4fd8, #ffe066, #53ff83, #00ffc3); background-size:300% 100%; animation:buttonFlow 4s linear infinite; }  
    @keyframes buttonFlow{ 0%{ background-position:0% 50%; } 100%{ background-position:300% 50%; } }  
    .submit-btn:hover{ transform:translateY(-3px); }  
  
    @media (max-width: 820px){ form{ grid-template-columns:1fr; } }  
    @media (max-width: 640px){ .hero-box { padding: 16px 14px; border-radius: 16px; } }  
  </style>  
</head>  
<body>  
  <div class="grid-bg"></div>  
  <div class="scanlines"></div>  
  <div class="noise"></div>  
  <div class="orb orb1"></div>  
  <div class="orb orb2"></div>  
  <div class="orb orb3"></div>  
  <canvas id="matrixCanvas"></canvas>  
  
  <div class="container">  
    <div class="hero-container">  
      <div class="profile-pic-center">  
        <img src="https://i.ibb.co/NdSDSKNx/IMG-20260623-034343-99.jpg" alt="Bruno Profile" class="round-profile">  
      </div>  
  
      <section class="hero-box">  
        <div class="hero-title">CYBER SECURITY EXPERT</div>  
      </section>  
        
      <section class="hero-box bruno-small-box">  
        <div class="hero-subtitle">Your Xamai Bruno</div>  
      </section>  
    </div>  
  
    <section class="panel">  
      <h2 class="panel-title"><i class="fa-solid fa-address-card"></i> My Information</h2>  
      <div class="social-grid">  
        <a class="social-btn" href="https://www.facebook.com/share/1Gy2AHukpZ/" target="_blank"><i class="fa-brands fa-facebook-f"></i> <span>Facebook</span></a>  
        <a class="social-btn" href="https://www.instagram.com/bruno_bbz9?igsh=MW5lM2N6ZGsxdm5vMQ==" target="_blank"><i class="fa-brands fa-instagram"></i> <span>Instagram</span></a>  
        <a class="social-btn" href="https://www.tiktok.com/@ruxns?_r=1&_t=ZS-97RaGDsqjc8" target="_blank"><i class="fa-brands fa-tiktok"></i> <span>TikTok</span></a>  
        <a class="social-btn" href="https://wa.me/8801347344027" target="_blank"><i class="fa-brands fa-whatsapp"></i> <span>WhatsApp</span></a>  
      </div>  
    </section>  
  
    <section class="panel">  
      <h2 class="panel-title problem-heading"><i class="fa-solid fa-file-circle-plus"></i> Tell us about your problem</h2>  
      <form id="supportForm">  
        <div class="input-wrap full">  
          <label>Your Name (Optional)</label>  
          <input type="text" id="name" placeholder="Enter your name (optional)" />  
        </div>  
        <div class="input-wrap full">  
          <label>Select Problem / Service</label>  
          <select id="service" required>  
            <option value="">-- Select a service --</option>  
            <option>TikTok Account Recovery</option>  
            <option>Facebook Disabled Account Recovery</option>  
            <option>Instagram Hacked Account Help</option>  
            <option>WhatsApp Account Banned Support</option>  
            <option>Gmail Account Recovery Help</option>  
          </select>  
        </div>  
        <div class="input-wrap full">  
          <label>Describe Your Problem</label>  
          <textarea id="problem" placeholder="Write your problem" required></textarea>  
        </div>  
        <div class="input-wrap full">  
          <button type="submit" class="submit-btn"><i class="fa-brands fa-whatsapp"></i> Submit on WhatsApp</button>  
        </div>  
      </form>  
    </section>  
  </div>  
  
  <script>  
    const canvas = document.getElementById("matrixCanvas");  
    const ctx = canvas.getContext("2d");  
    function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";  
    const fontSize = 16;  
    let columns = Math.floor(window.innerWidth / fontSize);  
    let drops = Array(columns).fill(1);  
    function drawMatrix(){  
      ctx.fillStyle = "rgba(3, 5, 11, 0.07)"; ctx.fillRect(0, 0, canvas.width, canvas.height);  
      for(let i = 0; i < drops.length; i++){  
        const char = chars.charAt(Math.floor(Math.random() * chars.length));  
        const x = i * fontSize; const y = drops[i] * fontSize;  
        ctx.fillStyle = "#00ffc3"; ctx.font = fontSize + "px monospace";  
        ctx.fillText(char, x, y);  
        if(y > canvas.height && Math.random() > 0.972) drops[i] = 0;  
        drops[i]++;  
      }  
    }  
    setInterval(drawMatrix, 28);  
    document.getElementById("supportForm").addEventListener("submit", function(e){  
      e.preventDefault();  
      const name = document.getElementById("name").value;  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value;  
      window.open(`https://wa.me/8801347344027?text=Name: ${name}%0AService: ${service}%0AProblem: ${problem}`, "_blank");  
    });  
  </script>  
</body>  
</html>
